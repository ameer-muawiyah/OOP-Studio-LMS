spring.application.name=oop-studio-lms

# MySQL datasource
spring.datasource.url=jdbc:mysql://localhost:3306/oop_studio_lms?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD_HERE
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate development settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
spring.jpa.defer-datasource-initialization=true

# SQL baseline data loading
spring.sql.init.mode=always

# Web / template development behavior
server.port=8080
spring.thymeleaf.cache=false